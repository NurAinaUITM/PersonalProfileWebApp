<html>

<head>

    <title>Personal Profile Form</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          type="text/css"
          href="style.css">

</head>

<body>

<div class="container">

    <h1>Personal Profile Form</h1>

    <form action="ProfileServlet" method="post">

        <label>Full Name</label>
        <input type="text"
               name="name"
               required>

        <label>Student ID</label>
        <input type="text"
               name="studentId"
               required>

        <label>Program</label>
        <input type="text"
               name="program"
               required>

        <label>Email</label>
        <input type="email"
               name="email"
               required>

        <label>Hobbies</label>
        <input type="text"
               name="hobbies">

        <label>Self Introduction</label>
        <textarea name="intro"></textarea>

        <button type="submit">
            Submit Profile
        </button>

    </form>

</div>

</body>
</html>
